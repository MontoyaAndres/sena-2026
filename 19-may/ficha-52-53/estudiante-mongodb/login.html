<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión — Ferremateriales JG</title>
    <link rel="icon" type="image/x-icon" href="./logo.png">
    <link rel="stylesheet" href="./inicio.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { display: flex; flex-direction: column; min-height: 100vh; background-color: var(--gris-claro); }
        .form-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; padding: 60px 20px; }
        .form-card { background: white; border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.12); }
        .form-card h2 { font-family: var(--fuente-titulo); font-size: 32px; color: var(--azul); margin-bottom: 6px; letter-spacing: 1px; }
        .form-card p { color: var(--gris-texto); font-size: 14px; margin-bottom: 28px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--azul); margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; font-family: var(--fuente-texto); transition: border-color 0.2s; outline: none; }
        .form-group input:focus { border-color: var(--azul-claro); }
        .btn-submit { width: 100%; padding: 14px; background-color: var(--rojo); color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; font-family: var(--fuente-texto); cursor: pointer; margin-top: 8px; transition: background-color 0.2s; }
        .btn-submit:hover { background-color: var(--rojo-oscuro); }
        .form-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--gris-texto); }
        .form-footer a { color: var(--azul-claro); font-weight: 600; text-decoration: none; }
        .form-footer a:hover { text-decoration: underline; }
        .mensaje { padding: 12px 14px; border-radius: 8px; font-size: 13px; font-weight: 600; margin-bottom: 16px; display: none; }
        .mensaje.error { background: #fdecea; color: #c0392b; border: 1px solid #e74c3c; }
        .mensaje.exito { background: #eafaf1; color: #1e8449; border: 1px solid #27ae60; }
    </style>
</head>

<body>
    <nav class="nav">
        <a href="inicio.html" class="nav-logo-link">
            <img src="./logo.png" alt="Logo" class="logo">
            <span class="nav-brand">Ferremateriales JG</span>
        </a>
        <div class="nav-options">
            <a class="nav-option" href="login.html">Iniciar Sesión</a>
            <a class="nav-option" href="registrer.html">Registrarse</a>
            <a class="nav-option" href="#">Acerca de</a>
        </div>
    </nav>

    <div class="form-wrapper">
        <div class="form-card">
            <h2>Iniciar Sesión</h2>
            <p>Ingresa tus datos para acceder a tu cuenta</p>

            <div id="mensaje" class="mensaje"></div>

            <div class="form-group">
                <label for="correo">Correo electrónico</label>
                <input type="email" id="correo" placeholder="ejemplo@correo.com">
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Tu contraseña">
            </div>

            <button class="btn-submit" onclick="iniciarSesion()">INICIAR SESIÓN</button>

            <div class="form-footer">
                ¿No tienes cuenta? <a href="registrer.html">Regístrate aquí</a>
            </div>
        </div>
    </div>

    <script>
        async function iniciarSesion() {
            const correo   = document.getElementById("correo").value.trim();
            const password = document.getElementById("password").value.trim();

            if (!correo || !password) {
                mostrarMensaje("Por favor completa todos los campos.", "error");
                return;
            }

            try {
                const res   = await fetch("/api/login", {
                    method:  "POST",
                    headers: { "Content-Type": "application/json" },
                    body:    JSON.stringify({ correo, password })
                });
                const datos = await res.json();

                if (res.ok) {
                    mostrarMensaje(`¡Bienvenido, ${datos.nombre}! Redirigiendo...`, "exito");
                    sessionStorage.setItem("usuario", datos.nombre);
                    sessionStorage.setItem("rol",     datos.rol);
                    setTimeout(() => { window.location.href = "inicio.html"; }, 1500);
                } else {
                    mostrarMensaje(datos.error || "Error al iniciar sesión.", "error");
                }
            } catch {
                mostrarMensaje("No se pudo conectar. ¿Está corriendo 'node server.js'?", "error");
            }
        }

        function mostrarMensaje(texto, tipo) {
            const div = document.getElementById("mensaje");
            div.textContent   = texto;
            div.className     = `mensaje ${tipo}`;
            div.style.display = "block";
        }

        document.addEventListener("keydown", (e) => { if (e.key === "Enter") iniciarSesion(); });
    </script>
</body>
</html>

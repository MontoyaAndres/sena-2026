<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="logo_sena.png" />
    <title>Registro - Sena</title>
    <link rel="stylesheet" href="./inicio.css" />
    <link rel="stylesheet" href="./login.css" />
    <link rel="stylesheet" href="./registro.css" />
  </head>
  <body>
    <nav class="navbar">
      <a href="inicio.html">
        <img src="./logo_sena.png" alt="" class="logo" />
      </a>
      <div class="navbar-options">
        <a class="navbar-option" href="login.html">Iniciar sesión</a>
        <a class="navbar-option" href="registro.html">Registro</a>
        <a class="navbar-option" href="acerca.html">Acerca de</a>
      </div>
    </nav>
    <div class="form-container">
      <form class="form" id="form">
        <h2 class="form-title">Registrarse</h2>
        <p class="form-description">
          Ingresa tu nombre, teléfono, correo y contraseña para continuar
        </p>
        <input
          id="name"
          type="text"
          name="name"
          class="form-input"
          placeholder="Ingresa tu nombre"
          required
        />
        <input
          id="email"
          type="email"
          name="email"
          class="form-input"
          placeholder="Ingresa tu correo"
          required
        />
        <input
          id="phone"
          type="tel"
          name="phone"
          class="form-input"
          placeholder="Ingresa tu teléfono"
          required
        />
        <input
          id="password"
          type="password"
          name="password"
          class="form-input"
          placeholder="Ingresa tu contraseña"
          required
        />
        <button class="form-button" type="submit">Registrarse</button>
      </form>
    </div>
  </body>
  <script>
    var form = document.getElementById("form");

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      var name = document.getElementById("name").value;
      var email = document.getElementById("email").value;
      var phone = document.getElementById("phone").value;
      var password = document.getElementById("password").value;

      alert(
        `Ha ingresado el nombre ${name}, el correo ${email}, el telefono ${phone}, y la contrasena ${password}`,
      );

      form.reset();
    });
  </script>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
  </head>
  <style>
    .box {
      width: 300px;
      height: 300px;
      border: 1px solid red;
    }

    .header {
      background-color: red;
    }

    .text-header {
      margin: 0;
      padding: 20px 10px;
      color: white;
    }

    .box-elements {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px;
    }

    .box-element {
      display: flex;
      flex-direction: column;
    }

    .box-input-label {
      padding-bottom: 10px;
    }

    .box-input {
      border: 1px solid gray;
      padding: 6px;
    }

    .box-button {
      background-color: red;
      color: white;
      border: 1px solid red;
      border-radius: 10px;
      padding: 10px 5px;
      width: calc(100% - 20px);
      margin: 10px 10px;
      cursor: pointer;
    }
  </style>
  <body>
    <div class="box">
      <div class="header">
        <p class="text-header">Iniciar sesion</p>
      </div>
      <div class="box-elements">
        <div class="box-element">
          <label for="email" class="box-input-label">Email</label>
          <input id="email" type="tel" class="box-input" />
        </div>
        <div class="box-element">
          <label for="password" class="box-input-label">Password</label>
          <input id="password" type="password" class="box-input" />
        </div>
      </div>
      <button class="box-button">Sign in</button>
    </div>
  </body>
</html>
